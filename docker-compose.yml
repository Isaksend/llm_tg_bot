version: '3.8'

services:
  app:
    build: .
    container_name: tg_ai_bot
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      - ./data/images:/app/data/images
      - huggingface_cache:/root/.cache/huggingface

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  huggingface_cache:
